name: RTScan
options:
  bundleIdPrefix: com.sangkyul

targets:
  RTScan:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - RTScan
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sangkyul.rtscan
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "RTScan uses the camera to read show and movie titles off your screen so it can look up Rotten Tomatoes scores."
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
